<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าเว็บต้อนรับ</title>
    <style>
        /* จัดตกแต่งหน้าตาเว็บให้ดูสะอาดและอยู่ตรงกลางจอ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #333;
        }
        .welcome-box {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #4a90e2;
        }
        p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="welcome-box">
        <!-- ข้อความต้อนรับจะถูกนำมาใส่ไว้ใน id นี้ด้วย JavaScript -->
        <h1 id="greeting">กำลังโหลด...</h1>
        <p>ยินดีต้อนรับเข้าสู่เว็บไซต์ของเรา</p>
    </div>

    <script>
        // ทำงานทันทีเมื่อหน้าเว็บโหลดเสร็จ
        window.onload = function() {
            // แสดงกล่อง Prompt รับชื่อจากผู้ใช้
            let userName = prompt("กรุณากรอกชื่อของคุณ:");

            // ตรวจสอบเงื่อนไข (ถ้าไม่ได้กรอกชื่อ หรือกด Cancel ให้ใช้คำว่า 'ผู้เยี่ยมชม')
            if (userName === null || userName.trim() === "") {
                userName = "ผู้เยี่ยมชม";
            }

            // นำชื่อไปแสดงบนหน้าเว็บในแท็ก <h1> ที่มี id="greeting"
            document.getElementById("greeting").innerText = "สวัสดีคุณ, " + userName + "! 👋";
        };
    </script>

</body>
</html>
