<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าเว็บต้อนรับ - ปริญญา พันธุ์วงศา</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #333;
        }
        .welcome-box {
            text-align: center;
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #2b5876;
            line-height: 1.4;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin-top: 15px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="welcome-box">
        <h1 id="greeting">กำลังโหลด...</h1>
        <p>ยินดีต้อนรับเข้าสู่เว็บไซต์ของเราอย่างเป็นทางการ</p>
    </div>

    <script>
        window.onload = function() {
            // ใส่ชื่อ "ปริญญา พันธุ์วงศา" เป็นค่าเริ่มต้นในกล่อง prompt
            let userName = prompt("กรุณากรอกชื่อของคุณ:", "ปริญญา พันธุ์วงศา");

            // ตรวจสอบเผื่อกรณีผู้ใช้งานลบชื่อออกจนว่างเปล่า หรือกด Cancel
            if (userName === null || userName.trim() === "") {
                userName = "ปริญญา พันธุ์วงศา";
            }

            // แสดงผลข้อความต้อนรับบนหน้าจอ
            document.getElementById("greeting").innerText = "สวัสดีคุณ " + userName + " ✨";
        };
    </script>

</body>
</html>
